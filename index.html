<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serenova Music | Featured Tracks</title>
    <style>
        body { margin: 0; background-color: #0b0b0b; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        
        nav { 
            padding: 20px 5%; 
            display: flex; 
            justify-content: space-between; 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .hero { 
            height: 60vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
        }

        h1 { 
            font-size: 3rem; 
            background: linear-gradient(45deg, #00f2fe 0%, #7000ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Music Gallery Styles */
        .gallery {
            padding: 50px 5%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .track-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            transition: 0.3s;
            text-align: center;
        }

        .track-card:hover { transform: translateY(-10px); background: #252525; }

        .album-art {
            width: 100%;
            aspect-ratio: 1/1;
            background: linear-gradient(45deg, #333, #111);
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        audio { width: 100%; margin-top: 15px; filter: invert(1); }
        .visualizer {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 3px;
  height: 30px;
  margin: 15px 0;
}

.bar {
  width: 5px;
  height: 10px;
  background: linear-gradient(to top, #00d2ff, #92fe9d);
  border-radius: 2px;
  animation: bounce 0.5s ease-in-out infinite alternate;
}

.bar:nth-child(2) { animation-duration: 0.8s; }
.bar:nth-child(3) { animation-duration: 0.6s; }
.bar:nth-child(4) { animation-duration: 0.9s; }
.bar:nth-child(5) { animation-duration: 0.7s; }

@keyframes bounce {
  from { height: 5px; }
  to { height: 25px; }
}

    </style>
</head>
<body>
    <nav>
        <div style="font-size: 1.5rem; font-weight: 800; letter-spacing: 2px;">SERENOVA</div>
    </nav>

    <div class="hero">
        <h1>Latest Releases</h1>
        <p>Listen to the newest sounds from the Serenova studio.</p>
    </div>

    <section class="gallery">
        <div class="track-card">
            <div class="album-art">🎵</div>
            <h3>Midnight Nebula</h3>
            <p>Electronic / Chill</p>
            <audio controls>
                <source src="YOUR_AUDIO_URL_HERE.mp3" type="audio/mpeg">
            </audio>
        </div>

        <section class="gallery">
    
    <div class="track-card">
        <h3>JO TUM MERE HO</h3>
        <p>Anuv Jain</p>
        <div class="visualizer">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
</div>

</section>

</body>
</html>
