<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serenova Music | The Sound of the Future</title>
    <style>
        body { margin: 0; background-color: #0b0b0b; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        
        nav { 
            padding: 20px 5%; 
            display: flex; 
            justify-content: space-between; 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .hero { 
            height: 80vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
            padding: 0 20px;
        }

        h1 { 
            font-size: 3rem; 
            background: linear-gradient(45deg, #00f2fe 0%, #7000ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        p { color: #a0a0a0; font-size: 1.1rem; max-width: 600px; line-height: 1.6; }

        .cta-button {
            margin-top: 30px;
            padding: 15px 35px;
            background: #ffffff;
            color: #000;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <nav>
        <div style="font-size: 1.5rem; font-weight: 800; letter-spacing: 2px;">SERENOVA</div>
    </nav>

    <div class="hero">
        <h1>Music that breathes.</h1>
        <p>Welcome to the future of sound. Serenova brings a new star to the musical universe.</p>
        <a href="#" class="cta-button">Launch Player</a>
    </div>
</body>
</html>
